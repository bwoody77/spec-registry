[package]
name = "autocomplete"
version = "0.3.1"
category = "components"
description = "Type-to-filter combobox — TextInput that opens an inline dropdown filtered by what the user types. Supports openOnFocus (browse without typing) and freeText (caller-controlled options for server-side filtering / free-form input like ICAO codes)."
license = "MIT"

[compatibility]
spec = ">=0.1.0"

[source]
origin = "@spec/components"
file = "autocomplete.spec"

[depends]
text-input = "0.1.0"
