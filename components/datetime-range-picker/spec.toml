[package]
name = "datetime-range-picker"
version = "0.1.1"
category = "components"
description = "Start date+time to end date+time range that may span multiple days (e.g. Fri 5pm to Tue 9am); the end is constrained to at least a minimum gap after the start."
license = "MIT"

[compatibility]
spec = ">=0.1.0"

[source]
origin = "@spec/components"
file = "datetime-range-picker.spec"

[depends]
date-picker = "0.3.0"
select = "0.2.1"
